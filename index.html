<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  IDEA MATRIX — Eisenhower-style idea plotter                ║
  ║  Supabase SQL setup — run this in your Supabase SQL editor  ║
  ╚══════════════════════════════════════════════════════════════╝

  CREATE TABLE ideas (
    id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
    username text NOT NULL,
    name text NOT NULL,
    effort integer NOT NULL CHECK (effort BETWEEN 0 AND 5),
    impact integer NOT NULL CHECK (impact BETWEEN 0 AND 5),
    notes text,
    created_at timestamptz DEFAULT now()
  );

  ALTER TABLE ideas ENABLE ROW LEVEL SECURITY;

  CREATE POLICY "users can manage their own ideas"
  ON ideas FOR ALL
  USING (true)
  WITH CHECK (true);
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idea Matrix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400;1,9..144,500&family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080808;
      --bg-2:     #0d0d0d;
      --bg-3:     #131313;
      --bg-4:     #191919;
      --border:   #1c1c1c;
      --border-2: #242424;
      --border-3: #2e2e2e;
      --text:     #e2dbd0;
      --text-2:   #8a837a;
      --text-3:   #3e3a36;
      --accent:   #c8b89a;
      --accent-2: rgba(200,184,154,0.07);

      --do-it:    #52a878;
      --plan-it:  #5089c4;
      --maybe:    #686868;
      --skip:     #be5454;

      --f-display: 'Fraunces', Georgia, serif;
      --f-body:    'Space Grotesk', system-ui, sans-serif;
      --f-mono:    'Space Mono', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--f-body);
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── NAME SCREEN ───────────────────────────────────────────── */
    #name-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #name-screen.hidden { display: none; }

    .name-wrap {
      width: 100%;
      max-width: 400px;
      padding: 0 24px;
    }

    .name-kicker {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .name-kicker::before {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--accent);
      opacity: 0.5;
    }

    .name-wrap h1 {
      font-family: var(--f-display);
      font-size: 48px;
      font-weight: 400;
      line-height: 1.0;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .name-wrap h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .name-tagline {
      font-family: var(--f-body);
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 44px;
      line-height: 1.7;
      font-weight: 300;
    }

    .name-field-label {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 8px;
      display: block;
    }

    .name-input-row {
      display: flex;
      gap: 0;
      border: 1px solid var(--border-2);
      transition: border-color 0.15s;
    }
    .name-input-row:focus-within { border-color: var(--accent); }

    #username-input {
      flex: 1;
      background: var(--bg-3);
      border: none;
      color: var(--text);
      font-family: var(--f-body);
      font-size: 14px;
      font-weight: 400;
      padding: 13px 16px;
      outline: none;
    }
    #username-input::placeholder { color: var(--text-3); }

    #name-submit-btn {
      background: var(--accent);
      border: none;
      color: #080808;
      font-family: var(--f-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0 20px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    #name-submit-btn:hover { opacity: 0.85; }

    #name-error {
      font-family: var(--f-mono);
      font-size: 11px;
      color: var(--skip);
      margin-top: 10px;
      min-height: 16px;
    }

    /* ── APP ──────────────────────────────────────────────────── */
    #app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    #app.hidden { display: none; }

    /* ── SIDEBAR ──────────────────────────────────────────────── */
    #sidebar {
      width: 300px;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      background: var(--bg-2);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    /* Brand strip */
    .brand {
      padding: 20px 22px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .brand-name {
      font-family: var(--f-display);
      font-size: 19px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.01em;
      line-height: 1;
    }
    .brand-user {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--f-mono);
      font-size: 10px;
      color: var(--text-3);
    }
    .brand-username { color: var(--accent); }
    #change-name-btn {
      color: var(--text-3);
      font-family: var(--f-mono);
      font-size: 10px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
      text-decoration: underline;
      text-decoration-color: var(--border-2);
      text-underline-offset: 2px;
    }
    #change-name-btn:hover { color: var(--text-2); }

    /* Add form */
    #add-form {
      padding: 20px 22px 22px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .form-heading {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 16px;
    }

    .f-group { margin-bottom: 12px; }
    .f-label {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-3);
      display: block;
      margin-bottom: 7px;
    }

    .f-input {
      width: 100%;
      background: var(--bg-3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--f-body);
      font-size: 13px;
      font-weight: 400;
      padding: 9px 11px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .f-input:focus { border-color: var(--border-3); }
    .f-input::placeholder { color: var(--text-3); }

    textarea.f-input {
      resize: vertical;
      min-height: 60px;
      line-height: 1.6;
    }

    /* Sliders */
    .slider-group { margin-bottom: 12px; }
    .slider-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .slider-top .f-label { margin-bottom: 0; }
    .slider-num {
      font-family: var(--f-mono);
      font-size: 13px;
      color: var(--accent);
      font-weight: 700;
      min-width: 14px;
      text-align: right;
    }

    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 1px;
      background: var(--border-2);
      outline: none;
      cursor: pointer;
      margin: 4px 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.1s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    input[type="range"]::-moz-range-thumb {
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;
      border: none;
      cursor: pointer;
    }
    .slider-ends {
      display: flex;
      justify-content: space-between;
      font-family: var(--f-mono);
      font-size: 9px;
      color: var(--text-3);
      letter-spacing: 0.06em;
      margin-top: 3px;
    }

    .submit-btn {
      width: 100%;
      background: var(--bg-4);
      border: 1px solid var(--border-2);
      color: var(--text-2);
      font-family: var(--f-mono);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.08em;
      padding: 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      margin-top: 4px;
    }
    .submit-btn:hover {
      background: var(--accent-2);
      border-color: var(--border-3);
      color: var(--accent);
    }
    .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Error */
    .inline-error {
      font-family: var(--f-mono);
      font-size: 10px;
      color: var(--skip);
      margin-bottom: 10px;
      line-height: 1.5;
      min-height: 0;
    }
    .inline-error:empty { display: none; }

    /* Ideas list */
    #ideas-section {
      flex: 1;
      overflow-y: auto;
      padding: 18px 22px 24px;
    }
    #ideas-section::-webkit-scrollbar { width: 2px; }
    #ideas-section::-webkit-scrollbar-track { background: transparent; }
    #ideas-section::-webkit-scrollbar-thumb { background: var(--border-2); }

    .list-heading-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .list-heading {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
    }
    #ideas-count {
      font-family: var(--f-mono);
      font-size: 10px;
      color: var(--text-3);
    }

    .loading-row {
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--text-3);
      font-family: var(--f-mono);
      font-size: 10px;
      padding: 8px 0;
    }
    .spinner {
      width: 11px; height: 11px;
      border: 1.5px solid var(--border-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Idea card */
    .idea-card {
      border: 1px solid var(--border);
      border-left: 2px solid var(--border);
      padding: 12px 14px;
      margin-bottom: 6px;
      position: relative;
      background: var(--bg-3);
      transition: border-color 0.15s, border-left-color 0.15s;
      cursor: default;
    }
    .idea-card:hover { border-color: var(--border-2); }
    .idea-card.q-do-it   { border-left-color: rgba(82,168,120,0.4); }
    .idea-card.q-plan-it { border-left-color: rgba(80,137,196,0.4); }
    .idea-card.q-maybe   { border-left-color: rgba(104,104,104,0.3); }
    .idea-card.q-skip    { border-left-color: rgba(190,84,84,0.4); }

    .card-name {
      font-family: var(--f-body);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
      padding-right: 22px;
      line-height: 1.35;
      word-break: break-word;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-scores {
      font-family: var(--f-mono);
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: 0.04em;
    }

    .q-pill {
      font-family: var(--f-mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 7px;
      font-weight: 700;
    }
    .q-do-it   { background: rgba(82,168,120,0.10); color: var(--do-it); }
    .q-plan-it { background: rgba(80,137,196,0.10); color: var(--plan-it); }
    .q-maybe   { background: rgba(104,104,104,0.10); color: var(--maybe); }
    .q-skip    { background: rgba(190,84,84,0.10); color: var(--skip); }

    .del-btn {
      position: absolute;
      top: 10px; right: 10px;
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 14px;
      line-height: 1;
      padding: 2px 4px;
      cursor: pointer;
      font-family: var(--f-mono);
      transition: color 0.15s;
    }
    .del-btn:hover { color: var(--skip); }

    .empty-list {
      font-family: var(--f-display);
      font-style: italic;
      font-size: 14px;
      color: var(--text-3);
      text-align: center;
      padding: 32px 0;
      line-height: 1.7;
    }

    /* ── MAIN ─────────────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 22px 26px 22px 22px;
      gap: 12px;
    }

    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .main-title {
      font-family: var(--f-display);
      font-size: 18px;
      font-weight: 400;
      font-style: italic;
      color: var(--text-2);
      letter-spacing: -0.01em;
    }

    .export-btn {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--text-3);
      background: none;
      border: 1px solid var(--border);
      padding: 6px 14px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .export-btn:hover { color: var(--accent); border-color: var(--border-2); }

    /* Legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 18px;
      flex-shrink: 0;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--f-mono);
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: 0.03em;
    }
    .legend-pip {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Canvas */
    .canvas-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
    }
    #matrix-canvas {
      display: block;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── TOOLTIP ──────────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      background: var(--bg-2);
      border: 1px solid var(--border-2);
      padding: 13px 15px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      max-width: 230px;
      z-index: 999;
    }
    #tooltip.show { opacity: 1; }

    .tt-name {
      font-family: var(--f-body);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 7px;
      line-height: 1.35;
    }
    .tt-row {
      font-family: var(--f-mono);
      font-size: 10px;
      color: var(--text-3);
      margin-bottom: 2px;
      letter-spacing: 0.04em;
    }
    .tt-quadrant {
      font-family: var(--f-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .tt-notes {
      font-family: var(--f-display);
      font-style: italic;
      font-size: 12px;
      color: var(--text-2);
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      line-height: 1.6;
    }
  </style>
</head>
<body>

<!-- ── NAME SCREEN ──────────────────────────────────────────── -->
<div id="name-screen">
  <div class="name-wrap">
    <h1>Idea<br><em>Matrix</em></h1>
    <p class="name-tagline">Evaluate before you build.</p>
    <label class="name-field-label" for="username-input">Who are you</label>
    <div class="name-input-row">
      <input type="text" id="username-input" placeholder="your name" autocomplete="off" spellcheck="false">
      <button id="name-submit-btn">ENTER →</button>
    </div>
    <div id="name-error"></div>
  </div>
</div>

<!-- ── APP ──────────────────────────────────────────────────── -->
<div id="app" class="hidden">
  <aside id="sidebar">

    <div class="brand">
      <span class="brand-name">Idea Matrix</span>
      <div class="brand-user">
        <span class="brand-username" id="display-username"></span>
        <button id="change-name-btn">change</button>
      </div>
    </div>

    <form id="add-form" autocomplete="off">
      <div class="form-heading">new idea</div>

      <div class="f-group">
        <label class="f-label" for="idea-name">Name</label>
        <input type="text" id="idea-name" class="f-input" placeholder="What's the idea?" required>
      </div>

      <div class="slider-group">
        <div class="slider-top">
          <label class="f-label" for="effort-slider">Effort</label>
          <span class="slider-num" id="effort-val">0</span>
        </div>
        <input type="range" id="effort-slider" min="0" max="5" step="1" value="0">
        <div class="slider-ends"><span>low</span><span>high</span></div>
      </div>

      <div class="slider-group">
        <div class="slider-top">
          <label class="f-label" for="impact-slider">Impact</label>
          <span class="slider-num" id="impact-val">0</span>
        </div>
        <input type="range" id="impact-slider" min="0" max="5" step="1" value="0">
        <div class="slider-ends"><span>low</span><span>high</span></div>
      </div>

      <div class="f-group">
        <label class="f-label" for="idea-notes">Notes <span style="opacity:.4">(optional)</span></label>
        <textarea id="idea-notes" class="f-input" placeholder="Context, links, hypotheses…"></textarea>
      </div>

      <div id="form-error" class="inline-error"></div>
      <button type="submit" class="submit-btn" id="add-btn">add to matrix</button>
    </form>

    <div id="ideas-section">
      <div class="list-heading-row">
        <span class="list-heading">all ideas</span>
        <span id="ideas-count"></span>
      </div>
      <div id="loading-ideas" class="loading-row" style="display:none">
        <div class="spinner"></div><span>fetching…</span>
      </div>
      <div id="list-error" class="inline-error"></div>
      <div id="ideas-list"></div>
    </div>

  </aside>

  <main id="main">
    <div class="main-header">
      <span class="main-title">The Matrix</span>
      <button class="export-btn" id="export-btn">↓ export json</button>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-pip" style="background:var(--do-it)"></div>
        <span>do it — low effort, high impact</span>
      </div>
      <div class="legend-item">
        <div class="legend-pip" style="background:var(--plan-it)"></div>
        <span>plan it — high effort, high impact</span>
      </div>
      <div class="legend-item">
        <div class="legend-pip" style="background:var(--maybe)"></div>
        <span>maybe — low effort, low impact</span>
      </div>
      <div class="legend-item">
        <div class="legend-pip" style="background:var(--skip)"></div>
        <span>skip — high effort, low impact</span>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="matrix-canvas"></canvas>
    </div>
  </main>
</div>

<!-- Tooltip -->
<div id="tooltip">
  <div class="tt-name"  id="tt-name"></div>
  <div class="tt-row"   id="tt-scores"></div>
  <div class="tt-quadrant" id="tt-quadrant"></div>
  <div class="tt-notes" id="tt-notes"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── CONFIG ─────────────────────────────────────────────────────
const SUPABASE_URL      = 'https://oianjnevxsswpneyllod.supabase.co'
const SUPABASE_ANON_KEY = 'sb_publishable_Fu5sKItajdlPW3PfigUNNA_-ezidGaZ'
// ──────────────────────────────────────────────────────────────

const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// ── STATE ──────────────────────────────────────────────────────
let currentUser = null
let ideas       = []
let hovered     = null

// ── QUADRANT ───────────────────────────────────────────────────
const Q = {
  'do-it':   { label: 'Do It',   cls: 'q-do-it',   color: '#52a878' },
  'plan-it': { label: 'Plan It', cls: 'q-plan-it',  color: '#5089c4' },
  'maybe':   { label: 'Maybe',   cls: 'q-maybe',    color: '#686868' },
  'skip':    { label: 'Skip',    cls: 'q-skip',     color: '#be5454' },
}

function quad(effort, impact) {
  if (effort < 3 && impact >= 3) return Q['do-it']
  if (effort >= 3 && impact >= 3) return Q['plan-it']
  if (effort < 3 && impact < 3)  return Q['maybe']
  return Q['skip']
}

// ── NAME SCREEN ────────────────────────────────────────────────
const nameScreen = document.getElementById('name-screen')
const appEl      = document.getElementById('app')

function showApp(name) {
  currentUser = name
  document.getElementById('display-username').textContent = name
  nameScreen.classList.add('hidden')
  appEl.classList.remove('hidden')
  document.fonts.ready.then(() => { initCanvas(); loadIdeas() })
}

function showNameScreen() {
  nameScreen.classList.remove('hidden')
  appEl.classList.add('hidden')
  document.getElementById('username-input').value = ''
  setTimeout(() => document.getElementById('username-input').focus(), 60)
}

document.getElementById('name-submit-btn').addEventListener('click', () => {
  const name = document.getElementById('username-input').value.trim()
  if (!name) { document.getElementById('name-error').textContent = 'Enter a name to continue.'; return }
  document.getElementById('name-error').textContent = ''
  localStorage.setItem('idea-matrix-username', name)
  showApp(name)
})
document.getElementById('username-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('name-submit-btn').click()
})
document.getElementById('change-name-btn').addEventListener('click', () => {
  localStorage.removeItem('idea-matrix-username')
  currentUser = null; ideas = []
  showNameScreen()
})

const saved = localStorage.getItem('idea-matrix-username')
if (saved) showApp(saved); else showNameScreen()

// ── SUPABASE ───────────────────────────────────────────────────
async function loadIdeas() {
  setLoading(true); setErr('list', '')
  const { data, error } = await db
    .from('ideas').select('*')
    .eq('username', currentUser)
    .order('created_at', { ascending: false })
  setLoading(false)
  if (error) { setErr('list', 'Load failed: ' + error.message); return }
  ideas = data || []
  renderList(); renderMatrix()
}

async function insertIdea(payload) {
  const { error } = await db.from('ideas').insert([payload])
  if (error) { setErr('form', 'Could not add: ' + error.message); return false }
  return true
}

async function deleteIdea(id) {
  const { error } = await db.from('ideas').delete().eq('id', id)
  if (error) { setErr('list', 'Delete failed: ' + error.message); return false }
  return true
}

// ── ADD FORM ───────────────────────────────────────────────────
const effortSlider = document.getElementById('effort-slider')
const impactSlider = document.getElementById('impact-slider')
effortSlider.addEventListener('input', () => document.getElementById('effort-val').textContent = effortSlider.value)
impactSlider.addEventListener('input', () => document.getElementById('impact-val').textContent = impactSlider.value)

document.getElementById('add-form').addEventListener('submit', async e => {
  e.preventDefault(); setErr('form', '')
  const name = document.getElementById('idea-name').value.trim()
  if (!name) return

  const btn = document.getElementById('add-btn')
  btn.disabled = true; btn.textContent = 'adding…'

  const ok = await insertIdea({
    username: currentUser,
    name,
    effort: +effortSlider.value,
    impact: +impactSlider.value,
    notes:  document.getElementById('idea-notes').value.trim() || null,
  })

  btn.disabled = false; btn.textContent = 'add to matrix'
  if (ok) {
    document.getElementById('idea-name').value  = ''
    document.getElementById('idea-notes').value = ''
    effortSlider.value = 0; document.getElementById('effort-val').textContent = '0'
    impactSlider.value = 0; document.getElementById('impact-val').textContent = '0'
    document.getElementById('idea-name').focus()
    await loadIdeas()
  }
})
document.getElementById('idea-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('add-form').requestSubmit() }
})

// ── RENDER LIST ────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('ideas-list')
  const cnt  = document.getElementById('ideas-count')
  cnt.textContent = ideas.length ? `${ideas.length} idea${ideas.length !== 1 ? 's' : ''}` : ''

  if (!ideas.length) {
    list.innerHTML = '<div class="empty-list">No ideas yet.<br>Add the first one above.</div>'
    return
  }

  list.innerHTML = ideas.map(idea => {
    const q = quad(idea.effort, idea.impact)
    return `<div class="idea-card ${q.cls}">
      <div class="card-name">${esc(idea.name)}</div>
      <div class="card-footer">
        <span class="card-scores">E${idea.effort} · I${idea.impact}</span>
        <span class="q-pill ${q.cls}">${q.label}</span>
      </div>
      <button class="del-btn" data-id="${idea.id}">×</button>
    </div>`
  }).join('')

  list.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      btn.disabled = true
      const ok = await deleteIdea(btn.dataset.id)
      if (ok) await loadIdeas(); else btn.disabled = false
    })
  })
}

// ── EXPORT ─────────────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click', () => {
  if (!ideas.length) return
  const a = document.createElement('a')
  a.href = URL.createObjectURL(new Blob([JSON.stringify(ideas, null, 2)], { type: 'application/json' }))
  a.download = `idea-matrix-${currentUser}-${Date.now()}.json`
  a.click()
})

// ── CANVAS ─────────────────────────────────────────────────────
const canvas  = document.getElementById('matrix-canvas')
const ctx     = canvas.getContext('2d')
const tooltip = document.getElementById('tooltip')

const PAD = { top: 32, right: 32, bottom: 60, left: 52 }
const DR  = 6  // dot radius
const HR  = 9  // hover radius

function initCanvas() {
  resize(); renderMatrix()
  new ResizeObserver(() => { resize(); renderMatrix() }).observe(canvas.parentElement)
  canvas.addEventListener('mousemove', onMove)
  canvas.addEventListener('mouseleave', onLeave)
}

function resize() {
  const el  = canvas.parentElement
  const dpr = window.devicePixelRatio || 1
  const w   = el.clientWidth
  const h   = el.clientHeight
  canvas.width  = w * dpr
  canvas.height = h * dpr
  canvas.style.width  = w + 'px'
  canvas.style.height = h + 'px'
  ctx.scale(dpr, dpr)
}

const cw = () => canvas.clientWidth
const ch = () => canvas.clientHeight
function px(effort) { return PAD.left + (effort / 5) * (cw() - PAD.left - PAD.right) }
function py(impact) { return PAD.top  + (1 - impact / 5) * (ch() - PAD.top - PAD.bottom) }

function renderMatrix() {
  const W = cw(), H = ch()
  const pw = W - PAD.left - PAD.right
  const ph = H - PAD.top  - PAD.bottom
  ctx.clearRect(0, 0, W, H)

  const mx = px(2.5)
  const my = py(2.5)

  // Quadrant fills
  const fills = [
    { x: PAD.left, y: PAD.top, w: mx - PAD.left, h: my - PAD.top, c: 'rgba(82,168,120,0.055)' },
    { x: mx, y: PAD.top, w: PAD.left + pw - mx, h: my - PAD.top, c: 'rgba(80,137,196,0.055)' },
    { x: PAD.left, y: my, w: mx - PAD.left, h: PAD.top + ph - my, c: 'rgba(100,100,100,0.04)' },
    { x: mx, y: my, w: PAD.left + pw - mx, h: PAD.top + ph - my, c: 'rgba(190,84,84,0.055)' },
  ]
  fills.forEach(f => { ctx.fillStyle = f.c; ctx.fillRect(f.x, f.y, f.w, f.h) })

  // Quadrant labels — Fraunces italic, centered in each quadrant
  const qlabels = [
    { text: 'Do It',   x: PAD.left + (mx - PAD.left) / 2,  y: PAD.top + (my - PAD.top) * 0.3,      c: 'rgba(82,168,120,0.38)'  },
    { text: 'Plan It', x: mx + (PAD.left + pw - mx) / 2,   y: PAD.top + (my - PAD.top) * 0.3,      c: 'rgba(80,137,196,0.38)'  },
    { text: 'Maybe',   x: PAD.left + (mx - PAD.left) / 2,  y: my + (PAD.top + ph - my) * 0.7,      c: 'rgba(100,100,100,0.30)' },
    { text: 'Skip',    x: mx + (PAD.left + pw - mx) / 2,   y: my + (PAD.top + ph - my) * 0.7,      c: 'rgba(190,84,84,0.38)'   },
  ]
  ctx.font = 'italic 400 15px Fraunces, Georgia, serif'
  ctx.textAlign    = 'center'
  ctx.textBaseline = 'middle'
  qlabels.forEach(g => {
    ctx.fillStyle = g.c
    ctx.fillText(g.text, g.x, g.y)
  })

  // Faint grid lines at each integer
  ctx.strokeStyle = 'rgba(255,255,255,0.025)'
  ctx.lineWidth   = 1
  ctx.setLineDash([])
  for (let i = 1; i <= 4; i++) {
    if (i === 2 || i === 3) continue // skip near-midpoint, handled by divider
    const gx = px(i), gy = py(i)
    ctx.beginPath(); ctx.moveTo(gx, PAD.top); ctx.lineTo(gx, PAD.top + ph); ctx.stroke()
    ctx.beginPath(); ctx.moveTo(PAD.left, gy); ctx.lineTo(PAD.left + pw, gy); ctx.stroke()
  }

  // Dividers
  ctx.setLineDash([2, 8])
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'
  ctx.lineWidth   = 1
  ctx.beginPath(); ctx.moveTo(mx, PAD.top); ctx.lineTo(mx, PAD.top + ph); ctx.stroke()
  ctx.beginPath(); ctx.moveTo(PAD.left, my); ctx.lineTo(PAD.left + pw, my); ctx.stroke()
  ctx.setLineDash([])

  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'
  ctx.lineWidth   = 1
  ctx.strokeRect(PAD.left, PAD.top, pw, ph)

  // Axis ticks + numbers
  ctx.fillStyle    = 'rgba(62,58,54,0.9)'
  ctx.strokeStyle  = 'rgba(255,255,255,0.04)'
  ctx.lineWidth    = 1

  for (let i = 0; i <= 5; i++) {
    const tx = px(i), ty = py(i)

    ctx.font = '11px Space Mono, monospace'
    ctx.textAlign = 'center'; ctx.textBaseline = 'top'
    ctx.fillText(i, tx, PAD.top + ph + 10)
    ctx.beginPath(); ctx.moveTo(tx, PAD.top + ph); ctx.lineTo(tx, PAD.top + ph + 5); ctx.stroke()

    ctx.textAlign = 'right'; ctx.textBaseline = 'middle'
    ctx.fillText(i, PAD.left - 10, ty)
    ctx.beginPath(); ctx.moveTo(PAD.left, ty); ctx.lineTo(PAD.left - 4, ty); ctx.stroke()
  }

  // Axis titles
  ctx.fillStyle    = 'rgba(62,58,54,0.6)'
  ctx.font         = '10px Space Mono, monospace'
  ctx.textAlign    = 'center'; ctx.textBaseline = 'middle'
  ctx.fillText('effort →', PAD.left + pw / 2, PAD.top + ph + 44)

  ctx.save()
  ctx.translate(14, PAD.top + ph / 2)
  ctx.rotate(-Math.PI / 2)
  ctx.fillText('impact →', 0, 0)
  ctx.restore()

  // Empty state
  if (!ideas.length) {
    ctx.font         = 'italic 400 16px Fraunces, Georgia, serif'
    ctx.fillStyle    = 'rgba(62,58,54,0.5)'
    ctx.textAlign    = 'center'; ctx.textBaseline = 'middle'
    ctx.fillText('Your ideas will appear here.', W / 2, H / 2)
    return
  }

  // Dots
  ideas.forEach(idea => {
    const x  = px(idea.effort)
    const y  = py(idea.impact)
    const q  = quad(idea.effort, idea.impact)
    const ho = hovered && hovered.id === idea.id
    const r  = ho ? HR : DR

    if (ho) {
      const g = ctx.createRadialGradient(x, y, 0, x, y, r * 3.5)
      g.addColorStop(0, q.color + '28')
      g.addColorStop(1, 'transparent')
      ctx.fillStyle = g
      ctx.beginPath(); ctx.arc(x, y, r * 3.5, 0, Math.PI * 2); ctx.fill()
    }

    ctx.beginPath()
    ctx.arc(x, y, r, 0, Math.PI * 2)
    ctx.fillStyle = q.color + (ho ? '' : 'bb')
    ctx.fill()

    if (ho) {
      ctx.strokeStyle = q.color + '66'; ctx.lineWidth = 2; ctx.stroke()
    }

    const label = idea.name.length > 22 ? idea.name.slice(0, 21) + '…' : idea.name
    ctx.font         = `${ho ? 500 : 400} 11px Space Grotesk, system-ui, sans-serif`
    ctx.fillStyle    = ho ? 'rgba(226,219,208,0.95)' : 'rgba(226,219,208,0.45)'
    ctx.textAlign    = 'left'; ctx.textBaseline = 'middle'
    ctx.fillText(label, x + r + 6, y)
  })
}

// ── HOVER ──────────────────────────────────────────────────────
function onMove(e) {
  const r    = canvas.getBoundingClientRect()
  const mx   = e.clientX - r.left
  const my   = e.clientY - r.top
  let found  = null

  for (const idea of ideas) {
    const dx = px(idea.effort) - mx, dy = py(idea.impact) - my
    if (Math.hypot(dx, dy) <= HR + 5) { found = idea; break }
  }

  if (found !== hovered) {
    hovered = found
    canvas.style.cursor = found ? 'pointer' : 'default'
    renderMatrix()
  }
  found ? showTip(e.clientX, e.clientY, found) : hideTip()
}

function onLeave() {
  hovered = null; canvas.style.cursor = 'default'
  hideTip(); renderMatrix()
}

function showTip(mx, my, idea) {
  const q = quad(idea.effort, idea.impact)
  document.getElementById('tt-name').textContent    = idea.name
  document.getElementById('tt-scores').textContent  = `effort: ${idea.effort}  ·  impact: ${idea.impact}`
  const ttQ = document.getElementById('tt-quadrant')
  ttQ.textContent = q.label; ttQ.style.color = q.color
  const ttN = document.getElementById('tt-notes')
  ttN.textContent = idea.notes || ''; ttN.style.display = idea.notes ? 'block' : 'none'

  tooltip.classList.add('show')
  const tw = tooltip.offsetWidth || 230, th = tooltip.offsetHeight || 110
  let tx = mx + 18, ty = my - 10
  if (tx + tw > innerWidth  - 12) tx = mx - tw - 18
  if (ty + th > innerHeight - 12) ty = my - th - 4
  tooltip.style.left = tx + 'px'; tooltip.style.top = ty + 'px'
}
function hideTip() { tooltip.classList.remove('show') }

// ── HELPERS ────────────────────────────────────────────────────
function setLoading(on) { document.getElementById('loading-ideas').style.display = on ? 'flex' : 'none' }
function setErr(scope, msg) {
  document.getElementById(scope === 'list' ? 'list-error' : 'form-error').textContent = msg
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
</script>
