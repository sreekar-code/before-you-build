<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  IDEA MATRIX — Supabase SQL setup                           ║
  ║  Run this in your Supabase SQL editor before using the app  ║
  ╚══════════════════════════════════════════════════════════════╝

  CREATE TABLE ideas (
    id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
    username text NOT NULL,
    name text NOT NULL,
    effort integer NOT NULL CHECK (effort BETWEEN 0 AND 5),
    impact integer NOT NULL CHECK (impact BETWEEN 0 AND 5),
    notes text,
    created_at timestamptz DEFAULT now()
  );

  ALTER TABLE ideas ENABLE ROW LEVEL SECURITY;

  CREATE POLICY "users can manage their own ideas"
  ON ideas FOR ALL
  USING (true)
  WITH CHECK (true);
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idea Matrix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400;1,9..144,500&family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── NAME SCREEN ──────────────────────────────────────────── -->
<div id="name-screen">
  <div class="name-wrap">
    <h1>Idea<br><em>Matrix</em></h1>
    <p class="name-tagline">Evaluate before you build.</p>
    <label class="name-field-label" for="username-input">Who are you</label>
    <div class="name-input-row">
      <input type="text" id="username-input" placeholder="your name" autocomplete="off" spellcheck="false">
      <button id="name-submit-btn">ENTER →</button>
    </div>
    <div id="name-error"></div>
  </div>
</div>

<!-- ── APP ──────────────────────────────────────────────────── -->
<div id="app" class="hidden">
  <aside id="sidebar">

    <div class="brand">
      <span class="brand-name">Idea Matrix</span>
      <div class="brand-user">
        <span class="brand-username" id="display-username"></span>
        <button id="change-name-btn">change</button>
      </div>
    </div>

    <form id="add-form" autocomplete="off">
      <div class="form-heading">new idea</div>

      <div class="f-group">
        <label class="f-label" for="idea-name">Name</label>
        <input type="text" id="idea-name" class="f-input" placeholder="What's the idea?" required>
      </div>

      <div class="slider-group">
        <div class="slider-top">
          <label class="f-label" for="effort-slider">Effort</label>
          <span class="slider-num" id="effort-val">0</span>
        </div>
        <input type="range" id="effort-slider" min="0" max="5" step="1" value="0">
        <div class="slider-ends"><span>low</span><span>high</span></div>
      </div>

      <div class="slider-group">
        <div class="slider-top">
          <label class="f-label" for="impact-slider">Impact</label>
          <span class="slider-num" id="impact-val">0</span>
        </div>
        <input type="range" id="impact-slider" min="0" max="5" step="1" value="0">
        <div class="slider-ends"><span>low</span><span>high</span></div>
      </div>

      <div class="f-group">
        <label class="f-label" for="idea-notes">Notes <span style="opacity:.4">(optional)</span></label>
        <textarea id="idea-notes" class="f-input" placeholder="Context, links, hypotheses…"></textarea>
      </div>

      <div id="form-error" class="inline-error"></div>
      <button type="submit" class="submit-btn" id="add-btn">add to matrix</button>
    </form>

    <div id="ideas-section">
      <div class="list-heading-row">
        <span class="list-heading">all ideas</span>
        <span id="ideas-count"></span>
      </div>
      <div id="loading-ideas" class="loading-row" style="display:none">
        <div class="spinner"></div><span>fetching…</span>
      </div>
      <div id="list-error" class="inline-error"></div>
      <div id="ideas-list"></div>
    </div>

  </aside>

  <main id="main">
    <div class="main-header">
      <span class="main-title">The Matrix</span>
      <button class="export-btn" id="export-btn">↓ export json</button>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-pip" style="background:var(--do-it)"></div>
        <span>do it — low effort, high impact</span>
      </div>
      <div class="legend-item">
        <div class="legend-pip" style="background:var(--plan-it)"></div>
        <span>plan it — high effort, high impact</span>
      </div>
      <div class="legend-item">
        <div class="legend-pip" style="background:var(--maybe)"></div>
        <span>maybe — low effort, low impact</span>
      </div>
      <div class="legend-item">
        <div class="legend-pip" style="background:var(--skip)"></div>
        <span>skip — high effort, low impact</span>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="matrix-canvas"></canvas>
    </div>
  </main>
</div>

<!-- Tooltip -->
<div id="tooltip">
  <div class="tt-name"     id="tt-name"></div>
  <div class="tt-row"      id="tt-scores"></div>
  <div class="tt-quadrant" id="tt-quadrant"></div>
  <div class="tt-notes"    id="tt-notes"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
